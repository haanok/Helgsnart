<!DOCTYPE html>
<html lang="no">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helgsnart // digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;500;700;800&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #07070a;
      --bg-2: #0d0d12;
      --ink: #f3f4f0;
      --ink-2: #9aa09a;
      --ink-3: #43464a;
      --line: rgba(243, 244, 240, 0.10);
      --accent: #c4ff3a;
      --accent-glow: rgba(196, 255, 58, 0.35);
    }

    html[data-vibe="cyan"] {
      --accent: #3df0ff;
      --accent-glow: rgba(61, 240, 255, .35);
    }

    html[data-vibe="magenta"] {
      --accent: #ff3ddc;
      --accent-glow: rgba(255, 61, 220, .35);
    }

    html[data-vibe="lime"] {
      --accent: #c4ff3a;
      --accent-glow: rgba(196, 255, 58, .35);
    }

    html[data-vibe="amber"] {
      --accent: #ffb23a;
      --accent-glow: rgba(255, 178, 58, .30);
    }

    html[data-vibe="white"] {
      --accent: #f3f4f0;
      --accent-glow: rgba(243, 244, 240, .20);
    }

    html[data-light="true"] {
      --bg: #f3f4f0;
      --bg-2: #e7e8e2;
      --ink: #0a0a0a;
      --ink-2: #5a5d57;
      --ink-3: #b6b9b0;
      --line: rgba(10, 10, 10, .10);
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0) 0, rgba(255, 255, 255, 0) 2px, rgba(255, 255, 255, 0.025) 3px), radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.45) 100%);
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    html[data-scan="false"] body::before {
      background: none;
    }

    html[data-light="true"] body::before {
      mix-blend-mode: multiply;
      opacity: .6;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px, 2.5vw, 28px) clamp(18px, 3vw, 36px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .topbar .brand {
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .topbar .brand .led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow), 0 0 0 1px var(--accent);
      animation: blink 1.4s steps(2, end) infinite;
    }

    @keyframes blink {
      50% {
        opacity: .18
      }
    }

    .topbar .meta {
      display: flex;
      gap: 18px;
    }

    .topbar .meta span:not(:last-child)::after {
      content: "·";
      margin-left: 18px;
      color: var(--ink-3);
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 4vh, 36px);
      padding: clamp(20px, 6vh, 60px) 0;
    }

    .kicker {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .kicker .accent {
      color: var(--accent);
    }

    .kicker .bar {
      display: inline-block;
      height: 1px;
      width: 60px;
      background: linear-gradient(to right, transparent, var(--ink-3));
    }

    .kicker .bar.r {
      background: linear-gradient(to left, transparent, var(--ink-3));
    }

    .clock {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: clamp(2px, 0.6vw, 10px);
      font-weight: 700;
      font-size: clamp(48px, 10vw, 180px);
      line-height: 0.86;
      letter-spacing: -0.05em;
      max-width: 100%;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum", "zero";
      text-shadow: 0 0 36px var(--accent-glow);
    }

    .clock .grp {
      display: inline-flex;
      align-items: baseline;
      color: var(--accent);
    }

    .clock .grp .digit {
      display: inline-block;
      width: 0.58em;
      text-align: center;
      position: relative;
    }

    .clock .grp .digit::before {
      content: "8";
      position: absolute;
      inset: 0;
      color: var(--accent);
      opacity: 0.06;
      pointer-events: none;
    }

    html[data-ghost="false"] .clock .grp .digit::before {
      display: none;
    }

    .clock .grp .digit>span {
      position: relative;
      display: block;
      transition: transform 220ms cubic-bezier(.22, .61, .36, 1), opacity 220ms ease;
    }

    .clock .digit.tick>span {
      animation: tick 240ms cubic-bezier(.22, .61, .36, 1);
    }

    @keyframes tick {
      0% {
        transform: translateY(-0.18em);
        opacity: 0;
        filter: blur(2px);
      }

      100% {
        transform: translateY(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    .clock .colon {
      color: var(--accent);
      opacity: 1;
      transform: translateY(-0.06em);
      animation: colon 1s steps(2, end) infinite;
      margin: 0 -0.06em;
    }

    @keyframes colon {
      50% {
        opacity: .18
      }
    }

    .labels {
      display: flex;
      justify-content: center;
      gap: clamp(28px, 6vw, 80px);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .labels span {
      min-width: 1em;
      text-align: center;
    }

    .progress {
      width: min(720px, 86%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .progress .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .progress .row .v {
      color: var(--ink);
      font-feature-settings: "tnum";
    }

    .progress .bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    html[data-light="true"] .progress .bar {
      background: rgba(0, 0, 0, 0.04);
    }

    .progress .bar .fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      background: repeating-linear-gradient(to right, var(--accent) 0 6px, transparent 6px 8px);
      transition: width 600ms cubic-bezier(.22, .61, .36, 1);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: end;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .footer .prompt {
      color: var(--ink);
    }

    .footer .prompt .accent {
      color: var(--accent);
    }

    .footer .prompt .caret {
      display: inline-block;
      width: 0.5em;
      height: 1em;
      background: var(--accent);
      transform: translateY(0.18em);
      margin-left: 0.2em;
      animation: blink 1s steps(2, end) infinite;
    }

    .weekend .clock {
      animation: glowpulse 2.6s ease-in-out infinite;
    }

    @keyframes glowpulse {

      0%,
      100% {
        text-shadow: 0 0 28px var(--accent-glow);
      }

      50% {
        text-shadow: 0 0 60px var(--accent-glow), 0 0 120px var(--accent-glow);
      }
    }

    .cityscape {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(58vh, 520px);
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 32%, #000 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, #000 32%, #000 100%);
    }

    .cityscape::before {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 36%;
      height: 24%;
      background: radial-gradient(ellipse at 50% 100%, color-mix(in oklab, var(--accent) 38%, transparent) 0%, color-mix(in oklab, var(--accent) 8%, transparent) 40%, transparent 70%);
      filter: blur(6px);
      opacity: .65;
      pointer-events: none;
    }

    .cityscape::after {
      content: "";
      position: absolute;
      inset: 0 0 35% 0;
      background-image: radial-gradient(1px 1px at 12% 22%, rgba(255, 255, 255, .7), transparent 60%), radial-gradient(1px 1px at 28% 60%, rgba(255, 255, 255, .5), transparent 60%), radial-gradient(1px 1px at 47% 18%, rgba(255, 255, 255, .6), transparent 60%), radial-gradient(1px 1px at 63% 44%, rgba(255, 255, 255, .5), transparent 60%), radial-gradient(1px 1px at 78% 30%, rgba(255, 255, 255, .7), transparent 60%), radial-gradient(1px 1px at 88% 64%, rgba(255, 255, 255, .4), transparent 60%), radial-gradient(1px 1px at 38% 80%, rgba(255, 255, 255, .4), transparent 60%);
      opacity: .55;
      animation: starpulse 5s ease-in-out infinite;
    }

    @keyframes starpulse {

      0%,
      100% {
        opacity: .5
      }

      50% {
        opacity: .75
      }
    }

    .layer {
      position: absolute;
      bottom: 0;
      left: 0;
      display: flex;
      width: 200%;
      will-change: transform;
      animation: scroll var(--dur, 120s) linear infinite;
    }

    .layer svg {
      display: block;
      flex: 0 0 50%;
      height: auto;
    }

    .layer.far {
      --dur: 280s;
      bottom: 12%;
      opacity: .42;
      filter: blur(0.6px);
    }

    .layer.mid {
      --dur: 140s;
      bottom: 6%;
      opacity: .78;
    }

    .layer.near {
      --dur: 70s;
      bottom: 0;
      opacity: 1;
    }

    @keyframes scroll {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-50%, 0, 0);
      }
    }

    .layer .bld {
      fill: color-mix(in oklab, var(--bg) 84%, #000);
    }

    .layer.far .bld {
      fill: color-mix(in oklab, var(--bg) 76%, var(--accent) 4%);
    }

    .layer.mid .bld {
      fill: color-mix(in oklab, #000 70%, var(--bg) 30%);
    }

    .layer.near .bld {
      fill: #000;
    }

    .layer .edge {
      fill: color-mix(in oklab, var(--accent) 30%, transparent);
    }

    .layer .win {
      fill: var(--accent);
      opacity: .85;
    }

    .layer .win.warm {
      fill: #ffb14a;
      opacity: .9;
    }

    .layer .win.dim {
      opacity: .14;
    }

    .layer .win.blink {
      animation: winblink var(--bd, 5s) steps(2, end) infinite;
      animation-delay: var(--bdelay, 0s);
    }

    @keyframes winblink {

      0%,
      78% {
        opacity: .85;
      }

      79%,
      100% {
        opacity: .12;
      }
    }

    .layer.far .win {
      opacity: .55;
    }

    .layer.near .win {
      filter: drop-shadow(0 0 2px var(--accent-glow));
    }

    .aircraft {
      position: absolute;
      top: 18%;
      left: -6%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ff5a5a;
      box-shadow: 0 0 8px rgba(255, 90, 90, .9), 0 0 18px rgba(255, 90, 90, .5);
      animation: fly 38s linear infinite, ablink 1.4s steps(2, end) infinite;
    }

    @keyframes fly {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(120vw, 30vh);
      }
    }

    @keyframes ablink {
      50% {
        opacity: .25;
      }
    }

    html[data-light="true"] .cityscape {
      display: none;
    }

    html[data-city="false"] .cityscape {
      display: none;
    }

    html[data-city="true"] .stage {
      position: relative;
    }

    html[data-city="true"] .stage::before {
      content: "";
      position: absolute;
      inset: -10% -10% -10% -10%;
      background: radial-gradient(ellipse at 50% 50%, color-mix(in oklab, var(--bg) 70%, transparent) 0%, transparent 65%);
      z-index: -1;
      pointer-events: none;
    }

    @media(prefers-reduced-motion:reduce) {

      .layer,
      .aircraft,
      .cityscape::after,
      .colon,
      .topbar .brand .led,
      .footer .prompt .caret {
        animation: none !important;
      }
    }

    @media(max-width:640px) {
      .topbar {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }

      .topbar .meta {
        gap: 14px;
      }

      .clock {
        font-size: clamp(40px, 13vw, 96px);
        gap: 2px;
      }

      .clock .grp .digit {
        width: 0.6em;
      }

      .labels {
        gap: 18px;
      }
    }

    .booting #root {
      opacity: 0;
    }

    #root {
      transition: opacity 240ms ease;
    }

    /* ── tweaks panel ── */
    .tweaks-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-2);
      border: 1px solid var(--line);
      color: var(--ink-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: color .2s, border-color .2s;
    }

    .tweaks-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .tweaks-panel {
      position: fixed;
      bottom: 74px;
      right: 24px;
      z-index: 100;
      background: var(--bg-2);
      border: 1px solid var(--line);
      padding: 16px 18px;
      min-width: 230px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
      display: none;
    }

    .tweaks-panel.open {
      display: block;
    }

    .tweaks-panel .tp-title {
      color: var(--ink);
      font-weight: 700;
      margin-bottom: 14px;
      font-size: 11px;
      letter-spacing: .2em;
    }

    .tweaks-panel .tp-section {
      color: var(--accent);
      margin: 12px 0 6px;
      font-size: 10px;
      letter-spacing: .24em;
    }

    .tweaks-panel .tp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
      gap: 10px;
    }

    .tweaks-panel .tp-row label {
      color: var(--ink-2);
    }

    .tweaks-panel .tp-radio {
      display: flex;
      gap: 6px;
    }

    .tweaks-panel .tp-radio button {
      background: transparent;
      border: 1px solid var(--ink-3);
      color: var(--ink-2);
      padding: 3px 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: all .15s;
    }

    .tweaks-panel .tp-radio button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tweaks-panel select {
      background: var(--bg);
      border: 1px solid var(--ink-3);
      color: var(--ink);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 6px;
      cursor: pointer;
    }

    .tweaks-panel .tp-toggle {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      border: 1px solid var(--ink-3);
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all .2s;
      flex-shrink: 0;
    }

    .tweaks-panel .tp-toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink-3);
      transition: all .2s;
    }

    .tweaks-panel .tp-toggle.on {
      background: var(--accent);
      border-color: var(--accent);
    }

    .tweaks-panel .tp-toggle.on::after {
      left: 16px;
      background: var(--bg);
    }
  </style>
</head>

<body class="booting">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useMemo, useState, useRef, useCallback } = React;

    const TWEAK_DEFAULTS = {
      vibe: "cyan",
      weekendStart: "fri16",
      light: false,
      scanlines: true,
      ghostDigit: true,
      cityscape: true,
    };

    function useTweaks(defaults) {
      const [tweaks, setTweaks] = useState(defaults);
      const set = useCallback((k, v) => setTweaks(prev => ({ ...prev, [k]: v })), []);
      return [tweaks, set];
    }

    // ── Tweaks Panel ──────────────────────────────────────────
    function TweaksPanel({ children }) {
      const [open, setOpen] = useState(false);
      return (
        <>
          <div className={"tweaks-panel" + (open ? " open" : "")}>
            <div className="tp-title">⚙ Tweaks</div>
            {children}
          </div>
          <button className="tweaks-toggle" onClick={() => setOpen(o => !o)} title="Tweaks">
            {open ? "✕" : "⚙"}
          </button>
        </>
      );
    }
    function TweakSection({ label }) {
      return <div className="tp-section">— {label}</div>;
    }
    function TweakRadio({ label, value, options, onChange }) {
      return (
        <div className="tp-row">
          <label>{label}</label>
          <div className="tp-radio">
            {options.map(o => (
              <button key={o} className={value === o ? "active" : ""} onClick={() => onChange(o)}>{o}</button>
            ))}
          </div>
        </div>
      );
    }
    function TweakSelect({ label, value, options, onChange }) {
      return (
        <div className="tp-row">
          <label>{label}</label>
          <select value={value} onChange={e => onChange(e.target.value)}>
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      );
    }
    function TweakToggle({ label, value, onChange }) {
      return (
        <div className="tp-row">
          <label>{label}</label>
          <button className={"tp-toggle" + (value ? " on" : "")} onClick={() => onChange(!value)} />
        </div>
      );
    }

    // ── Cityscape ─────────────────────────────────────────────
    function makeRng(seed) {
      let s = seed >>> 0;
      return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; };
    }
    function buildLayer(seed, panelW, opts) {
      const rnd = makeRng(seed);
      const { hMin, hMax, wMin, wMax, gap, baseY, winSize, winGap, winOnProb, antennaProb } = opts;
      const buildings = [];
      let x = 0;
      while (x < panelW) {
        const w = Math.round(wMin + rnd() * (wMax - wMin));
        const h = Math.round(hMin + rnd() * (hMax - hMin));
        const top = baseY - h;
        const cols = Math.max(1, Math.floor((w - 8) / (winSize + winGap)));
        const rows = Math.max(1, Math.floor((h - 12) / (winSize + winGap)));
        const wins = [];
        const colShift = 4 + ((w - 8) - cols * (winSize + winGap) + winGap) / 2;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
          if (rnd() < 0.10) continue;
          const on = rnd() < winOnProb, warm = rnd() < 0.18, blink = on && rnd() < 0.22;
          wins.push({ x: x + colShift + c * (winSize + winGap), y: top + 6 + r * (winSize + winGap), on, warm, blink, bd: 3 + rnd() * 7, bdelay: rnd() * 6 });
        }
        let antenna = null;
        if (rnd() < antennaProb) antenna = { x: x + w / 2 - 0.5, y: top - (4 + rnd() * 18), h: 4 + rnd() * 18, light: rnd() < 0.5 };
        let setback = null;
        if (rnd() < 0.25 && w > 40) { const sw = w * (0.4 + rnd() * 0.35), sh = 8 + rnd() * 22; setback = { x: x + (w - sw) / 2 + (rnd() - 0.5) * 8, y: top - sh, w: sw, h: sh }; }
        buildings.push({ x, w, h, top, wins, antenna, setback });
        x += w + Math.round(gap * (0.4 + rnd() * 1.2));
      }
      return { buildings, width: x };
    }
    function Cityscape() {
      const PANEL_W = 1600;
      const data = useMemo(() => ({
        far: buildLayer(101, PANEL_W, { hMin: 50, hMax: 120, wMin: 30, wMax: 64, gap: 4, baseY: 180, winSize: 2, winGap: 3, winOnProb: 0.38, antennaProb: 0.1 }),
        mid: buildLayer(202, PANEL_W, { hMin: 90, hMax: 200, wMin: 48, wMax: 110, gap: 8, baseY: 240, winSize: 3, winGap: 4, winOnProb: 0.42, antennaProb: 0.22 }),
        near: buildLayer(303, PANEL_W, { hMin: 140, hMax: 300, wMin: 74, wMax: 160, gap: 12, baseY: 320, winSize: 4, winGap: 5, winOnProb: 0.40, antennaProb: 0.35 }),
      }), []);
      const renderLayer = (key, viewH) => {
        const layer = data[key], w = layer.width;
        const panel = (
          <svg viewBox={`0 0 ${w} ${viewH}`} preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
            {layer.buildings.map((b, i) => (
              <g key={i}>
                <rect className="bld" x={b.x} y={b.top} width={b.w} height={b.h + 10} />
                {b.setback && <rect className="bld" x={b.setback.x} y={b.setback.y} width={b.setback.w} height={b.setback.h + 2} />}
                <rect className="edge" x={b.x} y={b.top} width={b.w} height={0.6} />
                {b.antenna && <g>
                  <rect className="bld" x={b.antenna.x} y={b.antenna.y} width={1} height={b.antenna.h} />
                  {b.antenna.light && <circle className="win blink warm" cx={b.antenna.x + 0.5} cy={b.antenna.y} r={1.2} />}
                </g>}
                {b.wins.map((wn, j) => (
                  <rect key={j}
                    className={"win" + (wn.on ? "" : " dim") + (wn.warm ? " warm" : "") + (wn.blink ? " blink" : "")}
                    x={wn.x} y={wn.y}
                    width={key === 'far' ? 2 : key === 'mid' ? 3 : 4}
                    height={key === 'far' ? 2 : key === 'mid' ? 3 : 4}
                    style={wn.blink ? { ['--bd']: wn.bd.toFixed(2) + 's', ['--bdelay']: wn.bdelay.toFixed(2) + 's' } : null}
                  />
                ))}
              </g>
            ))}
          </svg>
        );
        return <div className={"layer " + key} key={key}>{panel}{panel}</div>;
      };
      return (
        <div className="cityscape" aria-hidden="true">
          {renderLayer('far', 200)}{renderLayer('mid', 260)}{renderLayer('near', 340)}
          <div className="aircraft" />
        </div>
      );
    }

    // ── Time helpers ──────────────────────────────────────────
    function nextWeekendStart(now, mode) {
      const day = now.getDay(), target = new Date(now);
      target.setMilliseconds(0); target.setSeconds(0);
      if (mode === 'sat00') {
        const d = (6 - day + 7) % 7; target.setDate(now.getDate() + d); target.setHours(0, 0, 0, 0);
        if (target <= now) target.setDate(target.getDate() + 7); return target;
      }
      const hour = mode === 'fri17' ? 17 : 16;
      let d = (5 - day + 7) % 7; target.setDate(now.getDate() + d); target.setHours(hour, 0, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 7); return target;
    }
    function weekendEnd(now) {
      const day = now.getDay(), e = new Date(now);
      const d = (7 - day) % 7; e.setDate(now.getDate() + d); e.setHours(23, 59, 59, 999); return e;
    }
    function isWeekend(now, mode) {
      const day = now.getDay();
      if (day === 0 || day === 6) return true;
      if (day === 5) { const h = now.getHours(); if (mode === 'sat00') return false; if (mode === 'fri17') return h >= 17; return h >= 16; }
      return false;
    }
    function diffParts(ms) {
      ms = Math.max(0, ms); const s = Math.floor(ms / 1000);
      return { d: Math.floor(s / 86400), h: Math.floor((s % 86400) / 3600), m: Math.floor((s % 3600) / 60), s: s % 60 };
    }
    function pad(n, w = 2) { return String(n).padStart(w, '0'); }

    function DigitGroup({ value, width }) {
      const str = pad(value, width), prevRef = useRef(str), prev = prevRef.current.split('');
      useEffect(() => { prevRef.current = str; });
      return (
        <span className="grp">
          {str.split('').map((c, i) => (
            <span className={"digit" + (c !== prev[i] ? " tick" : "")} key={i + '-' + c}><span>{c}</span></span>
          ))}
        </span>
      );
    }

    // ── App ───────────────────────────────────────────────────
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [now, setNow] = useState(new Date());
      useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
      useEffect(() => {
        const r = document.documentElement;
        r.dataset.vibe = t.vibe; r.dataset.light = String(!!t.light);
        r.dataset.scan = String(!!t.scanlines); r.dataset.ghost = String(!!t.ghostDigit);
        r.dataset.city = String(!!t.cityscape);
      }, [t.vibe, t.light, t.scanlines, t.ghostDigit, t.cityscape]);
      useEffect(() => { document.body.classList.remove('booting'); }, []);

      const onWeekend = isWeekend(now, t.weekendStart);
      const target = useMemo(() => onWeekend ? weekendEnd(now) : nextWeekendStart(now, t.weekendStart), [now.getMinutes(), onWeekend, t.weekendStart]);
      const parts = diffParts(target - now);

      const weekStart = useMemo(() => {
        const ws = new Date(now), day = ws.getDay(), back = day === 0 ? 6 : day - 1;
        ws.setDate(ws.getDate() - back); ws.setHours(0, 0, 0, 0); return ws;
      }, [now.toDateString()]);
      const nextWE = nextWeekendStart(weekStart, t.weekendStart);
      const pct = Math.min(100, Math.max(0, ((now - weekStart) / (nextWE - weekStart)) * 100));
      const clock = now.toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const weekendModes = { fri16: 'FREDAG 16:00', fri17: 'FREDAG 17:00', sat00: 'LØRDAG 00:00' };

      return (
        <>
          <Cityscape />
          <div className={"page" + (onWeekend ? " weekend" : "")}>
            <div className="topbar">
              <div className="brand">
                <span className="led" />
                HELGSNART<span style={{ color: 'var(--ink-3)', marginLeft: 8 }}>{'//'} v.02</span>
              </div>
              <div className="meta">
                <span>{onWeekend ? "MODE: WEEKEND" : "MODE: AWAIT"}</span>
                <span>SYS {clock}</span>
              </div>
            </div>
            <div className="stage">
              <div className="kicker">
                <span className="bar" />
                <span>{onWeekend ? "WEEKEND" : "NEDTELLING TIL"} <span className="accent">{onWeekend ? "// PÅGÅR" : weekendModes[t.weekendStart]}</span></span>
                <span className="bar r" />
              </div>
              <div className="clock" aria-label="countdown">
                <DigitGroup value={parts.d} width={parts.d > 99 ? 3 : 2} />
                <span className="colon">:</span>
                <DigitGroup value={parts.h} width={2} />
                <span className="colon">:</span>
                <DigitGroup value={parts.m} width={2} />
                <span className="colon">:</span>
                <DigitGroup value={parts.s} width={2} />
              </div>
              <div className="labels" aria-hidden="true">
                <span>DAG</span><span>TIME</span><span>MIN</span><span>SEK</span>
              </div>
              <div className="progress">
                <div className="row"><span>UKA SÅ LANGT</span><span className="v">{pct.toFixed(2)}%</span></div>
                <div className="bar"><div className="fill" style={{ width: pct + '%' }} /></div>
                <div className="row" style={{ color: 'var(--ink-3)' }}>
                  <span>MAN 00:00</span><span>{weekendModes[t.weekendStart]}</span>
                </div>
              </div>
            </div>
            <div className="footer">
              <div className="prompt">
                <span className="accent">&gt;</span> {onWeekend ? "ENJOY.SH" : "AWAIT_WEEKEND.SH"}<span className="caret" />
              </div>
              <div>{now.toISOString().replace('T', ' ').slice(0, 19)} UTC</div>
            </div>
            <TweaksPanel>
              <TweakSection label="Vibe" />
              <TweakRadio label="Accent" value={t.vibe} options={['lime', 'cyan']} onChange={v => setTweak('vibe', v)} />
              <TweakSelect label="More accents" value={t.vibe}
                options={[
                  { value: 'lime', label: 'Acid lime' }, { value: 'cyan', label: 'Electric cyan' },
                  { value: 'magenta', label: 'Hot magenta' }, { value: 'amber', label: 'Amber' }, { value: 'white', label: 'Mono white' },
                ]}
                onChange={v => setTweak('vibe', v)} />
              <TweakToggle label="Light mode" value={t.light} onChange={v => setTweak('light', v)} />
              <TweakToggle label="Cityscape" value={t.cityscape} onChange={v => setTweak('cityscape', v)} />
              <TweakToggle label="Scanlines" value={t.scanlines} onChange={v => setTweak('scanlines', v)} />
              <TweakToggle label="LCD ghost digit" value={t.ghostDigit} onChange={v => setTweak('ghostDigit', v)} />
              <TweakSection label="Countdown" />
              <TweakSelect label="Weekend starts" value={t.weekendStart}
                options={[
                  { value: 'fri16', label: 'Fredag 16:00' }, { value: 'fri17', label: 'Fredag 17:00' }, { value: 'sat00', label: 'Lørdag 00:00' },
                ]}
                onChange={v => setTweak('weekendStart', v)} />
            </TweaksPanel>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html

  :root{

  *{box-sizing:border-box}

  .labels span{min-width:1em;text-align:center;}
  .progress{width:min(720px,86%);display:flex;flex-direction:column;gap:10px;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-2);}
  .progress .row{display:flex;justify-content:space-between;align-items:baseline;}
  .progress .row .v{color:var(--ink);font-feature-settings:"tnum";}
  .progress .bar{height:6px;background:rgba(255,255,255,0.04);border:1px solid var(--line);position:relative;overflow:hidden;}
  html[data-light="true"] .progress .bar{background:rgba(0,0,0,0.04);}

  .footer{display:flex;justify-content:space-between;align-items:end;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);}

  .footer .prompt .accent{color:var(--accent);}

  .weekend .clock{animation:glowpulse 2.6s ease-in-out infinite;}
  @keyframes glowpulse{0%,100%{text-shadow:0 0 28px var(--accent-glow);}50%{text-shadow:0 0 60px var(--accent-glow),0 0 120px var(--accent-glow);}}
  .cityscape{position:fixed;left:0;right:0;bottom:0;height:min(58vh,520px);z-index:0;pointer-events:none;overflow:hidden;-webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 32%,#000 100%);mask-image:linear-gradient(to bottom,transparent 0%,#000 32%,#000 100%);}
  .cityscape::before{content:"";position:absolute;left:-10%;right:-10%;bottom:36%;height:24%;background:radial-gradient(ellipse at 50% 100%,color-mix(in oklab,var(--accent) 38%,transparent) 0%,color-mix(in oklab,var(--accent) 8%,transparent) 40%,transparent 70%);filter:blur(6px);opacity:.65;pointer-events:none;}
  .cityscape::after{content:"";position:absolute;inset:0 0 35% 0;background-image:radial-gradient(1px 1px at 12% 22%,rgba(255,255,255,.7),transparent 60%),radial-gradient(1px 1px at 28% 60%,rgba(255,255,255,.5),transparent 60%),radial-gradient(1px 1px at 47% 18%,rgba(255,255,255,.6),transparent 60%),radial-gradient(1px 1px at 63% 44%,rgba(255,255,255,.5),transparent 60%),radial-gradient(1px 1px at 78% 30%,rgba(255,255,255,.7),transparent 60%),radial-gradient(1px 1px at 88% 64%,rgba(255,255,255,.4),transparent 60%),radial-gradient(1px 1px at 38% 80%,rgba(255,255,255,.4),transparent 60%);opacity:.55;animation:starpulse 5s ease-in-out infinite;}
  @keyframes starpulse{0%,100%{opacity:.5}50%{opacity:.75}}
  .layer{position:absolute;bottom:0;left:0;display:flex;width:200%;will-change:transform;animation:scroll var(--dur,120s) linear infinite;}

  .aircraft{position:absolute;top:18%;left:-6%;width:4px;height:4px;border-radius:50%;background:#ff5a5a;box-shadow:0 0 8px rgba(255,90,90,.9),0 0 18px rgba(255,90,90,.5);animation:fly 38s linear infinite,ablink 1.4s steps(2,end) infinite;}

  html[data-light="true"] .cityscape{display:none;}

  @media(max-width:640px){.topbar{flex-direction:column;gap:10px;text-align:center;}.topbar .meta{gap:14px;}.clock{font-size:clamp(40px,13vw,96px);gap:2px;}.clock .grp .digit{width:0.6em;}.labels{gap:18px;}}

  }
  .tweaks-panel .tp-toggle::after{
    content:"";position:absolute;top:2px;left:2px;
    width:12px;height:12px;border-radius:50%;background:var(--ink-3);
    transition:all .2s;
  }
  .tweaks-panel .tp-toggle.on{background:var(--accent);border-color:var(--accent);}
  .tweaks-panel .tp-toggle.on::after{left:16px;background:var(--bg);}
</style>
</head>
<body class="booting">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useMemo, useState, useRef, useCallback } = React;

    const TWEAK_DEFAULTS = {
      vibe: "cyan",
      weekendStart: "fri16",
      light: false,
      scanlines: true,
      ghostDigit: true,
      cityscape: true,
    };

    function useTweaks(defaults) {
      const [tweaks, setTweaks] = useState(defaults);
      const set = useCallback((k, v) => setTweaks(prev => ({ ...prev, [k]: v })), []);
      return [tweaks, set];
    }

    // ── Tweaks Panel ──────────────────────────────────────────
    function TweaksPanel({ children }) {
      const [open, setOpen] = useState(false);
      return (
        <>
          <div className={"tweaks-panel" + (open ? " open" : "")}>
            <div className="tp-title">⚙ Tweaks</div>
            {children}
          </div>
          <button className="tweaks-toggle" onClick={() => setOpen(o => !o)} title="Tweaks">
            {open ? "✕" : "⚙"}
          </button>
        </>
      );
    }
    function TweakSection({ label }) {
      return <div className="tp-section">— {label}</div>;
    }
    function TweakRadio({ label, value, options, onChange }) {
      return (
        <div className="tp-row">
          <label>{label}</label>
          <div className="tp-radio">
            {options.map(o => (
              <button key={o} className={value === o ? "active" : ""} onClick={() => onChange(o)}>{o}</button>
            ))}
          </div>
        </div>
      );
    }
    function TweakSelect({ label, value, options, onChange }) {
      return (
        <div className="tp-row">
          <label>{label}</label>
          <select value={value} onChange={e => onChange(e.target.value)}>
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      );
    }
    function TweakToggle({ label, value, onChange }) {
      return (
        <div className="tp-row">
          <label>{label}</label>
          <button className={"tp-toggle" + (value ? " on" : "")} onClick={() => onChange(!value)} />
        </div>
      );
    }

    // ── Cityscape ─────────────────────────────────────────────
    function makeRng(seed) {
      let s = seed >>> 0;
      return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; };
    }
    function buildLayer(seed, panelW, opts) {
      const rnd = makeRng(seed);
      const { hMin, hMax, wMin, wMax, gap, baseY, winSize, winGap, winOnProb, antennaProb } = opts;
      const buildings = [];
      let x = 0;
      while (x < panelW) {
        const w = Math.round(wMin + rnd() * (wMax - wMin));
        const h = Math.round(hMin + rnd() * (hMax - hMin));
        const top = baseY - h;
        const cols = Math.max(1, Math.floor((w - 8) / (winSize + winGap)));
        const rows = Math.max(1, Math.floor((h - 12) / (winSize + winGap)));
        const wins = [];
        const colShift = 4 + ((w - 8) - cols * (winSize + winGap) + winGap) / 2;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
          if (rnd() < 0.10) continue;
          const on = rnd() < winOnProb, warm = rnd() < 0.18, blink = on && rnd() < 0.22;
          wins.push({ x: x + colShift + c * (winSize + winGap), y: top + 6 + r * (winSize + winGap), on, warm, blink, bd: 3 + rnd() * 7, bdelay: rnd() * 6 });
        }
        let antenna = null;
        if (rnd() < antennaProb) antenna = { x: x + w / 2 - 0.5, y: top - (4 + rnd() * 18), h: 4 + rnd() * 18, light: rnd() < 0.5 };
        let setback = null;
        if (rnd() < 0.25 && w > 40) { const sw = w * (0.4 + rnd() * 0.35), sh = 8 + rnd() * 22; setback = { x: x + (w - sw) / 2 + (rnd() - 0.5) * 8, y: top - sh, w: sw, h: sh }; }
        buildings.push({ x, w, h, top, wins, antenna, setback });
        x += w + Math.round(gap * (0.4 + rnd() * 1.2));
      }
      return { buildings, width: x };
    }
    function Cityscape() {
      const PANEL_W = 1600;
      const data = useMemo(() => ({
        far: buildLayer(101, PANEL_W, { hMin: 50, hMax: 120, wMin: 30, wMax: 64, gap: 4, baseY: 180, winSize: 2, winGap: 3, winOnProb: 0.38, antennaProb: 0.1 }),
        mid: buildLayer(202, PANEL_W, { hMin: 90, hMax: 200, wMin: 48, wMax: 110, gap: 8, baseY: 240, winSize: 3, winGap: 4, winOnProb: 0.42, antennaProb: 0.22 }),
        near: buildLayer(303, PANEL_W, { hMin: 140, hMax: 300, wMin: 74, wMax: 160, gap: 12, baseY: 320, winSize: 4, winGap: 5, winOnProb: 0.40, antennaProb: 0.35 }),
      }), []);
      const renderLayer = (key, viewH) => {
        const layer = data[key], w = layer.width;
        const panel = (
          <svg viewBox={`0 0 ${w} ${viewH}`} preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
            {layer.buildings.map((b, i) => (
              <g key={i}>
                <rect className="bld" x={b.x} y={b.top} width={b.w} height={b.h + 10} />
                {b.setback && <rect className="bld" x={b.setback.x} y={b.setback.y} width={b.setback.w} height={b.setback.h + 2} />}
                <rect className="edge" x={b.x} y={b.top} width={b.w} height={0.6} />
                {b.antenna && <g>
                  <rect className="bld" x={b.antenna.x} y={b.antenna.y} width={1} height={b.antenna.h} />
                  {b.antenna.light && <circle className="win blink warm" cx={b.antenna.x + 0.5} cy={b.antenna.y} r={1.2} />}
                </g>}
                {b.wins.map((wn, j) => (
                  <rect key={j}
                    className={"win" + (wn.on ? "" : " dim") + (wn.warm ? " warm" : "") + (wn.blink ? " blink" : "")}
                    x={wn.x} y={wn.y}
                    width={key === 'far' ? 2 : key === 'mid' ? 3 : 4}
                    height={key === 'far' ? 2 : key === 'mid' ? 3 : 4}
                    style={wn.blink ? { ['--bd']: wn.bd.toFixed(2) + 's', ['--bdelay']: wn.bdelay.toFixed(2) + 's' } : null}
                  />
                ))}
              </g>
            ))}
          </svg>
        );
        return <div className={"layer " + key} key={key}>{panel}{panel}</div>;
      };
      return (
        <div className="cityscape" aria-hidden="true">
          {renderLayer('far', 200)}{renderLayer('mid', 260)}{renderLayer('near', 340)}
          <div className="aircraft" />
        </div>
      );
    }

    // ── Time helpers ──────────────────────────────────────────
    function nextWeekendStart(now, mode) {
      const day = now.getDay(), target = new Date(now);
      target.setMilliseconds(0); target.setSeconds(0);
      if (mode === 'sat00') {
        const d = (6 - day + 7) % 7; target.setDate(now.getDate() + d); target.setHours(0, 0, 0, 0);
        if (target <= now) target.setDate(target.getDate() + 7); return target;
      }
      const hour = mode === 'fri17' ? 17 : 16;
      let d = (5 - day + 7) % 7; target.setDate(now.getDate() + d); target.setHours(hour, 0, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 7); return target;
    }
    function weekendEnd(now) {
      const day = now.getDay(), e = new Date(now);
      const d = (7 - day) % 7; e.setDate(now.getDate() + d); e.setHours(23, 59, 59, 999); return e;
    }
    function isWeekend(now, mode) {
      const day = now.getDay();
      if (day === 0 || day === 6) return true;
      if (day === 5) { const h = now.getHours(); if (mode === 'sat00') return false; if (mode === 'fri17') return h >= 17; return h >= 16; }
      return false;
    }
    function diffParts(ms) {
      ms = Math.max(0, ms); const s = Math.floor(ms / 1000);
      return { d: Math.floor(s / 86400), h: Math.floor((s % 86400) / 3600), m: Math.floor((s % 3600) / 60), s: s % 60 };
    }
    function pad(n, w = 2) { return String(n).padStart(w, '0'); }

    function DigitGroup({ value, width }) {
      const str = pad(value, width), prevRef = useRef(str), prev = prevRef.current.split('');
      useEffect(() => { prevRef.current = str; });
      return (
        <span className="grp">
          {str.split('').map((c, i) => (
            <span className={"digit" + (c !== prev[i] ? " tick" : "")} key={i + '-' + c}><span>{c}</span></span>
          ))}
        </span>
      );
    }

    // ── App ───────────────────────────────────────────────────
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [now, setNow] = useState(new Date());
      useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
      useEffect(() => {
        const r = document.documentElement;
        r.dataset.vibe = t.vibe; r.dataset.light = String(!!t.light);
        r.dataset.scan = String(!!t.scanlines); r.dataset.ghost = String(!!t.ghostDigit);
        r.dataset.city = String(!!t.cityscape);
      }, [t.vibe, t.light, t.scanlines, t.ghostDigit, t.cityscape]);
      useEffect(() => { document.body.classList.remove('booting'); }, []);

      const onWeekend = isWeekend(now, t.weekendStart);
      const target = useMemo(() => onWeekend ? weekendEnd(now) : nextWeekendStart(now, t.weekendStart), [now.getMinutes(), onWeekend, t.weekendStart]);
      const parts = diffParts(target - now);

      const weekStart = useMemo(() => {
        const ws = new Date(now), day = ws.getDay(), back = day === 0 ? 6 : day - 1;
        ws.setDate(ws.getDate() - back); ws.setHours(0, 0, 0, 0); return ws;
      }, [now.toDateString()]);
      const nextWE = nextWeekendStart(weekStart, t.weekendStart);
      const pct = Math.min(100, Math.max(0, ((now - weekStart) / (nextWE - weekStart)) * 100));
      const clock = now.toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const weekendModes = { fri16: 'FREDAG 16:00', fri17: 'FREDAG 17:00', sat00: 'LØRDAG 00:00' };

      return (
        <>
          <Cityscape />
          <div className={"page" + (onWeekend ? " weekend" : "")}>
            <div className="topbar">
              <div className="brand">
                <span className="led" />
                HELGSNART<span style={{ color: 'var(--ink-3)', marginLeft: 8 }}>{'//'} v.02</span>
              </div>
              <div className="meta">
                <span>{onWeekend ? "MODE: WEEKEND" : "MODE: AWAIT"}</span>
                <span>SYS {clock}</span>
              </div>
            </div>
            <div className="stage">
              <div className="kicker">
                <span className="bar" />
                <span>{onWeekend ? "WEEKEND" : "NEDTELLING TIL"} <span className="accent">{onWeekend ? "// PÅGÅR" : weekendModes[t.weekendStart]}</span></span>
                <span className="bar r" />
              </div>
              <div className="clock" aria-label="countdown">
                <DigitGroup value={parts.d} width={parts.d > 99 ? 3 : 2} />
                <span className="colon">:</span>
                <DigitGroup value={parts.h} width={2} />
                <span className="colon">:</span>
                <DigitGroup value={parts.m} width={2} />
                <span className="colon">:</span>
                <DigitGroup value={parts.s} width={2} />
              </div>
              <div className="labels" aria-hidden="true">
                <span>DAG</span><span>TIME</span><span>MIN</span><span>SEK</span>
              </div>
              <div className="progress">
                <div className="row"><span>UKA SÅ LANGT</span><span className="v">{pct.toFixed(2)}%</span></div>
                <div className="bar"><div className="fill" style={{ width: pct + '%' }} /></div>
                <div className="row" style={{ color: 'var(--ink-3)' }}>
                  <span>MAN 00:00</span><span>{weekendModes[t.weekendStart]}</span>
                </div>
              </div>
            </div>
            <div className="footer">
              <div className="prompt">
                <span className="accent">&gt;</span> {onWeekend ? "ENJOY.SH" : "AWAIT_WEEKEND.SH"}<span className="caret" />
              </div>
              <div>{now.toISOString().replace('T', ' ').slice(0, 19)} UTC</div>
            </div>
            <TweaksPanel>
              <TweakSection label="Vibe" />
              <TweakRadio label="Accent" value={t.vibe} options={['lime', 'cyan']} onChange={v => setTweak('vibe', v)} />
              <TweakSelect label="More accents" value={t.vibe}
                options={[
                  { value: 'lime', label: 'Acid lime' }, { value: 'cyan', label: 'Electric cyan' },
                  { value: 'magenta', label: 'Hot magenta' }, { value: 'amber', label: 'Amber' }, { value: 'white', label: 'Mono white' },
                ]}
                onChange={v => setTweak('vibe', v)} />
              <TweakToggle label="Light mode" value={t.light} onChange={v => setTweak('light', v)} />
              <TweakToggle label="Cityscape" value={t.cityscape} onChange={v => setTweak('cityscape', v)} />
              <TweakToggle label="Scanlines" value={t.scanlines} onChange={v => setTweak('scanlines', v)} />
              <TweakToggle label="LCD ghost digit" value={t.ghostDigit} onChange={v => setTweak('ghostDigit', v)} />
              <TweakSection label="Countdown" />
              <TweakSelect label="Weekend starts" value={t.weekendStart}
                options={[
                  { value: 'fri16', label: 'Fredag 16:00' }, { value: 'fri17', label: 'Fredag 17:00' }, { value: 'sat00', label: 'Lørdag 00:00' },
                ]}
                onChange={v => setTweak('weekendStart', v)} />
            </TweaksPanel>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
